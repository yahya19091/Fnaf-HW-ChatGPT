```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bonnie Bowl</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<a-entity camera position="0 1.6 3"></a-entity>

<a-plane rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>

<a-box position="0 0 -4" width="2" height="0.1" depth="10" color="#555"></a-box>

<a-sphere position="0 1 1" radius="0.25" color="purple"></a-sphere>

<a-cylinder position="0 0.5 -6" radius="0.1" height="0.6" color="white"></a-cylinder>
<a-cylinder position="-0.3 0.5 -6" radius="0.1" height="0.6" color="white"></a-cylinder>
<a-cylinder position="0.3 0.5 -6" radius="0.1" height="0.6" color="white"></a-cylinder>

<a-box position="0 1 3" color="green" onclick="finishBowl()"></a-box>
<a-text value="Finish Game" position="0 2 3"></a-text>

</a-scene>

<script>
function finishBowl(){
localStorage.setItem("bowl",true)
window.location.href="index.html"
}
</script>

</body>
</html>
```
