```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pizza Job</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<a-entity camera position="0 1.6 2"></a-entity>

<a-plane rotation="-90 0 0" width="20" height="20" color="#222"></a-plane>

<a-cylinder position="0 1 -2" radius="0.5" height="0.1" color="orange"></a-cylinder>

<a-sphere position="-0.2 1.1 -2" radius="0.05" color="red"></a-sphere>
<a-sphere position="0.2 1.1 -2" radius="0.05" color="green"></a-sphere>

<a-box position="0 1 1" color="green" onclick="finishPizza()"></a-box>
<a-text value="Serve Pizza" position="0 2 1"></a-text>

</a-scene>

<script>
function finishPizza(){
localStorage.setItem("pizza",true)
window.location.href="index.html"
}
</script>

</body>
</html>
