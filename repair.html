```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repair Station</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<a-entity camera position="0 1.6 2"></a-entity>

<a-plane rotation="-90 0 0" width="20" height="20" color="#222"></a-plane>

<a-box position="0 1 -2" width="1" height="1" depth="1" color="gray"></a-box>

<a-sphere position="-1 1 -2" radius="0.2" color="red"></a-sphere>
<a-sphere position="1 1 -2" radius="0.2" color="green"></a-sphere>

<a-box position="0 1 2" color="green" onclick="repairDone()"></a-box>
<a-text value="Finish Repair" position="0 2 2"></a-text>

</a-scene>

<script>
function repairDone(){
localStorage.setItem("repair",true)
window.location.href="index.html"
}
</script>

</body>
</html>
