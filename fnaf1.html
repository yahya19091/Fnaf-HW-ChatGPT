<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FNAF 1 Job</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<a-entity camera position="0 1.6 0"></a-entity>

<a-plane rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>

<a-box position="0 0.5 -2" width="3" height="1" depth="1" color="#333"></a-box>

<a-box position="-2 1 -3" color="red"></a-box>
<a-text value="Left Door" position="-2 2 -3"></a-text>

<a-box position="2 1 -3" color="red"></a-box>
<a-text value="Right Door" position="2 2 -3"></a-text>

<a-box position="0 1 2" color="green" onclick="win()"></a-box>
<a-text value="Complete Shift" position="0 2 2"></a-text>

</a-scene>

<script>
function win(){
localStorage.setItem("fnaf1",true)
window.location.href="index.html"
}
</script>

</body>
</html>
